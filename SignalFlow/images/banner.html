<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SignalFlow — Whop Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; padding: 40px 20px; font-family: 'Rajdhani', sans-serif; }
    .label { color: #6B7A99; font-family: 'Space Mono', monospace; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; }
    .banner-wrap { border-radius: 12px; overflow: hidden; border: 1px solid rgba(0,217,255,0.15); box-shadow: 0 0 60px rgba(0,217,255,0.08); max-width: 100%; }
    canvas { display: block; max-width: 100%; height: auto; }
    .dl-btn {
      font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 10px 28px; border-radius: 6px; cursor: pointer;
      border: 1px solid rgba(0,217,255,0.3); background: rgba(0,217,255,0.08);
      color: #00D9FF; transition: all 0.15s; font-weight: 700;
    }
    .dl-btn:hover { background: rgba(0,217,255,0.18); }
  </style>
</head>
<body>
  <div class="label">Whop Banner — 1500 × 500</div>
  <div class="banner-wrap">
    <canvas id="banner" width="1500" height="500" style="width:900px;height:300px;"></canvas>
  </div>
  <button class="dl-btn" onclick="download()">↓ Download PNG (1500×500)</button>

  <script>
    var canvas = document.getElementById('banner');
    var ctx = canvas.getContext('2d');
    var W = 1500, H = 500;

    function draw() {
      // ── BACKGROUND ──
      var bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0,   '#050912');
      bg.addColorStop(0.5, '#080d1a');
      bg.addColorStop(1,   '#060b16');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // ── GRID ──
      ctx.strokeStyle = 'rgba(0,217,255,0.04)';
      ctx.lineWidth = 1;
      for (var x = 0; x < W; x += 60) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (var y = 0; y < H; y += 60) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // ── GLOW ORBS ──
      var orb1 = ctx.createRadialGradient(300, 250, 0, 300, 250, 380);
      orb1.addColorStop(0, 'rgba(0,217,255,0.07)');
      orb1.addColorStop(1, 'rgba(0,217,255,0)');
      ctx.fillStyle = orb1; ctx.fillRect(0, 0, W, H);

      var orb2 = ctx.createRadialGradient(1200, 250, 0, 1200, 250, 320);
      orb2.addColorStop(0, 'rgba(123,95,255,0.08)');
      orb2.addColorStop(1, 'rgba(123,95,255,0)');
      ctx.fillStyle = orb2; ctx.fillRect(0, 0, W, H);

      // ── CHART BARS (decorative right side) ──
      var barData = [0.3, 0.5, 0.4, 0.65, 0.55, 0.75, 0.6, 0.85, 0.7, 0.95, 0.8, 1.0];
      var barW = 38, barGap = 16, startX = 920;
      barData.forEach(function(h, i) {
        var barH = h * 280;
        var x = startX + i * (barW + barGap);
        var y = H - 80 - barH;
        var grad = ctx.createLinearGradient(x, y, x, y + barH);
        grad.addColorStop(0, 'rgba(0,217,255,' + (0.15 + h * 0.25) + ')');
        grad.addColorStop(1, 'rgba(0,217,255,0.04)');
        ctx.fillStyle = grad;
        roundRect(ctx, x, y, barW, barH, 6);
        ctx.fill();
        // top glow line
        ctx.fillStyle = 'rgba(0,217,255,' + (0.4 + h * 0.5) + ')';
        roundRect(ctx, x, y, barW, 3, 1.5);
        ctx.fill();
      });

      // ── DIAGONAL ACCENT LINE ──
      ctx.beginPath();
      ctx.moveTo(880, H);
      ctx.lineTo(900, 0);
      ctx.strokeStyle = 'rgba(0,217,255,0.08)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // ── LOGO MARK (ascending bars) ──
      var lx = 100, ly = 160, scale = 3.2;
      var bars = [
        { x: 0,  y: 56, w: 11, h: 16, op: 0.45, color: '#7B5FFF' },
        { x: 16, y: 42, w: 11, h: 30, op: 0.6,  color: '#3D9BFF' },
        { x: 32, y: 26, w: 11, h: 46, op: 0.78, color: '#00C4F0' },
        { x: 48, y: 8,  w: 11, h: 64, op: 1.0,  color: '#00D9FF' },
      ];
      bars.forEach(function(b) {
        ctx.globalAlpha = b.op;
        ctx.fillStyle = b.color;
        roundRect(ctx, lx + b.x * scale / 2.2, ly + b.y * scale / 3.2, b.w * scale / 2.2, b.h * scale / 3.2, 4);
        ctx.fill();
      });
      // dot
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#00D9FF';
      ctx.beginPath();
      ctx.arc(lx + 48 * scale / 2.2 + (11 * scale / 2.2) / 2, ly + 8 * scale / 3.2 - 7, 7, 0, Math.PI * 2);
      ctx.fill();
      // dot glow
      var dotGlow = ctx.createRadialGradient(
        lx + 48 * scale / 2.2 + (11 * scale / 2.2) / 2, ly + 8 * scale / 3.2 - 7, 0,
        lx + 48 * scale / 2.2 + (11 * scale / 2.2) / 2, ly + 8 * scale / 3.2 - 7, 40
      );
      dotGlow.addColorStop(0, 'rgba(0,217,255,0.4)');
      dotGlow.addColorStop(1, 'rgba(0,217,255,0)');
      ctx.fillStyle = dotGlow;
      ctx.fillRect(lx, ly - 50, 200, 100);

      // ── WORDMARK ──
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#E8EDF8';
      ctx.font = '700 92px Rajdhani, sans-serif';
      ctx.letterSpacing = '2px';
      ctx.fillText('SIGNAL', lx + 115, ly + 58);

      ctx.fillStyle = '#00D9FF';
      ctx.font = '700 62px Rajdhani, sans-serif';
      ctx.letterSpacing = '10px';
      ctx.fillText('FLOW', lx + 118, ly + 118);

      // divider line
      ctx.strokeStyle = 'rgba(0,217,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(lx + 115, ly + 70);
      ctx.lineTo(lx + 490, ly + 70);
      ctx.stroke();

      // ── TAGLINE ──
      ctx.fillStyle = 'rgba(107,122,153,0.9)';
      ctx.font = '500 28px Rajdhani, sans-serif';
      ctx.letterSpacing = '4px';
      ctx.fillText('YOUR SIGNAL. YOUR EDGE.', lx + 116, ly + 160);

      // ── PILL TAGS ──
      var tags = ['Daily Watchlist', 'Technical Analysis', 'Weekly Setups', 'Private Community'];
      var tagX = lx + 116;
      var tagY = ly + 210;
      tags.forEach(function(tag) {
        ctx.font = '600 20px Rajdhani, sans-serif';
        var tw = ctx.measureText(tag).width;
        var pw = tw + 28, ph = 34;
        // pill bg
        ctx.fillStyle = 'rgba(0,217,255,0.07)';
        ctx.strokeStyle = 'rgba(0,217,255,0.2)';
        ctx.lineWidth = 1;
        roundRect(ctx, tagX, tagY, pw, ph, 17);
        ctx.fill(); ctx.stroke();
        // pill text
        ctx.fillStyle = 'rgba(0,217,255,0.85)';
        ctx.fillText(tag, tagX + 14, tagY + 22);
        tagX += pw + 12;
      });

      // ── JOIN BUTTON ──
      ctx.fillStyle = '#00D9FF';
      roundRect(ctx, lx + 116, ly + 268, 220, 56, 6);
      ctx.fill();
      ctx.fillStyle = '#050912';
      ctx.font = '700 26px Rajdhani, sans-serif';
      ctx.letterSpacing = '3px';
      ctx.fillText('JOIN NOW', lx + 116 + 42, ly + 268 + 37);

      // bottom border glow
      var bottomGrad = ctx.createLinearGradient(0, H - 3, W, H - 3);
      bottomGrad.addColorStop(0,   'rgba(0,217,255,0)');
      bottomGrad.addColorStop(0.3, 'rgba(0,217,255,0.5)');
      bottomGrad.addColorStop(0.7, 'rgba(123,95,255,0.5)');
      bottomGrad.addColorStop(1,   'rgba(0,217,255,0)');
      ctx.fillStyle = bottomGrad;
      ctx.fillRect(0, H - 3, W, 3);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function download() {
      var a = document.createElement('a');
      a.download = 'signalflow-whop-banner.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    // Wait for fonts then draw
    document.fonts.ready.then(function() { draw(); });
    setTimeout(draw, 800);
  </script>
</body>
</html>
